<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrimp Config V2</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="topbar">
      <p class="eyebrow">Shrimp Cab Co.</p>
      <h1>4x12 Configurator</h1>
    </header>

    <section class="preview-card">
      <div id="cabinet">
        <img class="layer base" src="assets/412/base/base.png" />

        <div id="bodyLayer" class="layer svg-layer"></div>
        <div id="accentLayer" class="layer svg-layer"></div>
        <div id="thirdLayer" class="layer svg-layer"></div>

        <img id="grillLayer" class="layer grill-layer" src="" />
        <img id="grillPipingLayer" class="layer grill-piping-layer" src="" />
        <img id="pipingLayer" class="layer piping-layer" src="" />
      </div>
    </section>

<section class="controls">
  <div class="livery-row">
    <div class="section-label big">Livery</div>
    <div id="liveryButtons" class="livery-buttons"></div>
  </div>

  <div class="control-grid">
    <div class="tolex-panel">
      <div class="section-label big">Tolex</div>
      <div id="colorWheels" class="color-wheels"></div>
    </div>

    <div class="grill-panel">
      <div class="button-section">
        <div class="section-label big">Grill Cloth</div>
        <div id="grillButtons" class="swatch-buttons"></div>
      </div>

      <div class="button-section">
        <div class="section-label big">Grill Trim</div>
        <div id="grillTrimButtons" class="text-buttons"></div>
      </div>

      <div class="button-section">
        <div class="section-label big">Cabinet Trim</div>
        <div id="cabTrimButtons" class="text-buttons"></div>
      </div>
    </div>
  </div>
</section>
  </main>

  <script src="script.js"></script>
</body>
</html>
