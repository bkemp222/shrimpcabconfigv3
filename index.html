<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrimp Cab Configurator V2.0</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <!-- INSTRUMENT SELECT -->
    <section id="instrumentScreen" class="instrument-screen">
      <img
        class="instrument-hero"
        src="assets/instrument_select.png"
        alt="Shrimp Cab Co. instrument select"
      />

      <h3>Choose Your Instrument</h3>

<div class="instrument-buttons">

    <div class="instrument-option">
        <button class="image-btn" data-instrument="bass">
            <img src="assets/swatches/instruments/bass_idle" alt="Bass">
        </button>

        <span class="instrument-label">Bass</span>
    </div>

    <div class="instrument-option">
        <button class="image-btn" data-instrument="guitar">
            <img src="assets/swatches/instruments/guitar_idle.png" alt="Guitar">
        </button>

        <span class="instrument-label">Guitar</span>
    </div>

</div>
    </section>

    <!-- CONFIGURATOR -->
    <section id="configurator" class="configurator hidden">

      <div class="top-bar">
        <button id="backToInstrument" class="back-btn">← Back to Instrument</button>
      </div>

      <nav id="sizeSelector" class="size-selector" aria-label="Cab size"></nav>

      <section class="render-shell">
        <div id="renderStage" class="render-stage" aria-label="Cab render"></div>
      </section>

      <section class="controls">

        <!-- LIVERY -->
        <section class="control-section">
          <h4>LIVERY</h4>
          <div id="liverySelector" class="button-row"></div>
        </section>

        <section class="control-layout">

          <!-- TOLEX -->
          <section class="tolex-section">
            <h2>Tolex</h2>

            <div class="wheel-group">
              <button class="wheel-arrow" data-wheel="main" data-dir="-1">‹</button>
              <div class="wheel-wrap">
                <div class="wheel-marker"></div>
                <div id="mainWheel" class="color-wheel"></div>
              </div>
              <button class="wheel-arrow" data-wheel="main" data-dir="1">›</button>

              <h3 id="mainLabel">Black</h3>
              <p>Main</p>
            </div>

            <div class="wheel-group">
              <button class="wheel-arrow" data-wheel="main2" data-dir="-1">‹</button>
              <div class="wheel-wrap">
                <div class="wheel-marker"></div>
                <div id="main2Wheel" class="color-wheel"></div>
              </div>
              <button class="wheel-arrow" data-wheel="main2" data-dir="1">›</button>

              <h3 id="main2Label">Gold</h3>
              <p>Main 2</p>
            </div>

            <div class="wheel-group">
              <button class="wheel-arrow" data-wheel="accent" data-dir="-1">‹</button>
              <div class="wheel-wrap">
                <div class="wheel-marker"></div>
                <div id="accentWheel" class="color-wheel"></div>
              </div>
              <button class="wheel-arrow" data-wheel="accent" data-dir="1">›</button>

              <h3 id="accentLabel">Gold</h3>
              <p>Accent</p>
            </div>
          </section>

          <!-- GUITAR ONLY -->
          <section id="guitarControls" class="guitar-section">

            <section class="control-section">
              <h2>Grill Cloth</h2>
              <div id="grillSelector" class="grill-grid"></div>
              <h3 id="grillLabel">Black Basketweave</h3>
            </section>

            <section class="control-section">
              <h2>Grill Piping</h2>
              <div class="pill-row">
                <button class="pill active" data-grill-piping="white">White</button>
                <button class="pill" data-grill-piping="black">Black</button>
              </div>
            </section>

          </section>

        </section>

      </section>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
