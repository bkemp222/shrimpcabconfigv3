<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrimp Config V2</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="topbar">
      <p class="eyebrow">Shrimp Cab Co.</p>
      <h1>4x12 Configurator</h1>
    </header>

    <section class="preview-card">
      <div id="cabinet">
        <img class="layer base" src="assets/412/base/base.png" />

        <div id="bodyLayer" class="layer svg-layer"></div>
        <div id="accentLayer" class="layer svg-layer"></div>
        <div id="thirdLayer" class="layer svg-layer"></div>

        <img id="grillLayer" class="layer grill-layer" src="" />
        <img id="grillPipingLayer" class="layer grill-piping-layer" src="" />
        <img id="pipingLayer" class="layer piping-layer" src="" />
      </div>
    </section>

    <section id="selectorsCard" class="selectors-card"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
