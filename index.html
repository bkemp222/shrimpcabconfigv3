<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrimp Cab Configurator V2.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <section id="instrumentScreen" class="instrument-screen">
      <img src="assets/instrument_select.png" class="instrument-hero" alt="Choose instrument" />

      <h1>Choose Your Instrument</h1>

      <div class="instrument-buttons">
        <button class="image-button" data-instrument="guitar">
          <img src="assets/swatches/instruments/guitar_idle.png" data-idle="assets/swatches/instruments/guitar_idle.png" data-active="assets/swatches/instruments/guitar_active.png" alt="Guitar" />
        </button>

        <button class="image-button" data-instrument="bass">
          <img src="assets/swatches/instruments/bass_idle" data-idle="assets/swatches/instruments/bass_idle" data-active="assets/swatches/instruments/bass_active.png" alt="Bass" />
        </button>
      </div>
    </section>

    <section id="configurator" class="configurator hidden">

      <div id="sizeSelector" class="size-selector"></div>

      <div class="render-wrap">
        <div id="renderStage" class="render-stage"></div>
      </div>

      <section class="controls">

        <div class="control-row">
          <h2>Livery</h2>
          <div id="liverySelector" class="button-row"></div>
        </div>

        <div class="control-grid">

          <div class="tolex-panel">
            <h2>Tolex</h2>

            <div class="wheel-block">
              <button class="wheel-arrow" data-zone="main" data-dir="-1">&lt;</button>
              <div class="swatch-wheel" id="mainWheel"></div>
              <button class="wheel-arrow" data-zone="main" data-dir="1">&gt;</button>
              <h3 id="mainLabel">Black</h3>
              <p>Main</p>
            </div>

            <div class="wheel-block">
              <button class="wheel-arrow" data-zone="main2" data-dir="-1">&lt;</button>
              <div class="swatch-wheel" id="main2Wheel"></div>
              <button class="wheel-arrow" data-zone="main2" data-dir="1">&gt;</button>
              <h3 id="main2Label">Gold</h3>
              <p>Main 2</p>
            </div>

            <div class="wheel-block">
              <button class="wheel-arrow" data-zone="accent" data-dir="-1">&lt;</button>
              <div class="swatch-wheel" id="accentWheel"></div>
              <button class="wheel-arrow" data-zone="accent" data-dir="1">&gt;</button>
              <h3 id="accentLabel">Gold</h3>
              <p>Accent</p>
            </div>
          </div>

          <div class="right-panel">

            <div id="grillSection">
              <h2>Grill Cloth</h2>
              <div id="grillSelector" class="grill-grid"></div>
              <h3 id="grillLabel">Black Basketweave</h3>
            </div>

            <div id="grillTrimSection">
              <h2>Grill Piping</h2>
              <div class="pill-row">
                <button class="pill active" data-grill-trim="white">White</button>
                <button class="pill" data-grill-trim="black">Black</button>
              </div>
            </div>

          </div>

        </div>

      </section>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
