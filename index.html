<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrimp Config V2 Test</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Shrimp Cab Co.</p>
        <h1>Configurator V2 Test</h1>
      </div>
    </header>

    <section class="preview-card">
      <div id="cabinet">
        <img class="layer base" src="assets/base/212_base_v2.png" />

        <div id="bodyLayer" class="layer color-layer body-layer"></div>
        <div id="stripeLayer" class="layer color-layer stripe-layer"></div>

        <img class="layer shadows" src="assets/overlays/shadows.png" />
        <img class="layer spotlight" src="assets/overlays/spotlight.png" />
        <img class="layer highlights" src="assets/overlays/highlights.png" />
      </div>
    </section>

<section class="controls-card">
  <div class="picker-block">
    <label>Body</label>
    <div id="bodyPicker"></div>
    <span id="bodyHex">#5B3A29</span>
  </div>

  <div class="picker-block">
    <label>Stripes</label>
    <div id="stripePicker"></div>
    <span id="stripeHex">#D8A11D</span>
  </div>
</section>
  </main>
<script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
  <script src="script.js"></script>
</body>
</html>
