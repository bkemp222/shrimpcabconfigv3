<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrimp Configurator V2</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <section class="preview-card">
      <div id="sizeButtons" class="size-buttons"></div>

      <div id="cabinet">
        <img id="baseLayer" class="layer base" src="assets/412/base/base.png" />

        <div id="bodyLayer" class="layer svg-layer"></div>
        <div id="accentLayer" class="layer svg-layer"></div>
        <div id="thirdLayer" class="layer svg-layer"></div>

        <img id="grillLayer" class="layer grill-layer" src="" />
        <img id="grillPipingLayer" class="layer grill-piping-layer" src="" />
        <img id="pipingLayer" class="layer piping-layer" src="" />
      </div>
    </section>

    <section class="controls">
      <div class="livery-row">
        <div class="section-title">Livery</div>
        <div id="liveryButtons" class="livery-buttons"></div>
      </div>

      <div class="control-grid">
        <div class="tolex-panel">
          <div class="section-title">Tolex</div>
          <div id="colorWheels" class="color-wheels"></div>
        </div>

        <div class="grill-panel">
          <div class="section-title">Grill Cloth</div>
          <div id="grillButtons" class="grill-buttons"></div>
          <div id="grillName" class="selected-grill-name">Black Basketweave</div>

          <div class="trim-section">
            <div class="section-title">Grill Trim</div>
            <div id="grillTrimButtons" class="trim-buttons"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
