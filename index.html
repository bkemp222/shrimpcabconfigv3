<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrimp Config V2 Test</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="topbar">
      <p class="eyebrow">Shrimp Cab Co.</p>
      <h1>Configurator V2 Test</h1>
    </header>

    <section class="preview-card">
      <div id="cabinet">
        <img class="layer base" src="assets/base/212_base_v2.png" />

        <div id="bodyLayer" class="layer color-layer body-layer"></div>
        <div id="stripeLayer" class="layer color-layer stripe-layer"></div>
<img class="layer piping" src="assets/overlays/piping.png">
        <img class="layer shadows" src="assets/overlays/shadows.png" />
        <img class="layer spotlight" src="assets/overlays/spotlight.png" />
        <img class="layer highlights" src="assets/overlays/highlights.png" />
      </div>
    </section>

    <section class="selectors-card">
      <div class="selector-block">
        <div class="selector-label">Body</div>
        <div id="bodyName" class="selected-name">Black</div>
        <div id="bodyMeta" class="selected-meta">Levant · SBS</div>
        <div class="wheel-hint">⌃<br>⌄</div>
        <div id="bodyWheel" class="wheel"></div>
      </div>

      <div class="selector-block">
        <div class="selector-label">Accent</div>
        <div id="accentName" class="selected-name">Teal</div>
        <div id="accentMeta" class="selected-meta">Levant · Mojotone</div>
        <div class="wheel-hint">⌃<br>⌄</div>
        <div id="accentWheel" class="wheel"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
